<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Te Vemos — Venezuela</title>
<!-- v2-supabase -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0E0E0E; --surface:#1A1A1A; --surface2:#222222; --border:#2C2C2C;
  --text:#E8E4DC; --text-muted:#8A8480; --accent:#C8923A; --accent-dim:#7A5420;
  --danger:#8B3A3A; --success:#3A7A4E;
}
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(14,14,14,0.93); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:0 12px; height:52px;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.logo { font-family:'Playfair Display',serif; font-size:1.15rem; color:var(--text); letter-spacing:.02em; display:flex; align-items:center; gap:6px; text-decoration:none; flex-shrink:0; }
.logo svg { width:18px; height:18px; opacity:.85; }
.logo span { color:var(--accent); }
.header-mid { display:flex; gap:2px; flex-shrink:0; }
.nav-btn { background:none; border:none; color:var(--text-muted); font-family:'Inter',sans-serif; font-size:.75rem; padding:5px 8px; border-radius:5px; cursor:pointer; transition:color .15s,background .15s; white-space:nowrap; }
.nav-btn:hover,.nav-btn.active { color:var(--text); background:var(--surface2); }
.header-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.count-badge { font-size:.65rem; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2px 8px; white-space:nowrap; }
.count-badge strong { color:var(--accent); font-weight:600; }
.lang-switcher { display:flex; gap:2px; }
.lang-btn { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:.65rem; font-weight:600; letter-spacing:.03em; padding:3px 6px; border-radius:4px; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; min-width:28px; text-align:center; }
.lang-btn.active,.lang-btn:hover { border-color:var(--accent-dim); color:var(--accent); }
/* On very small screens, hide count badge to save space */
@media(max-width:380px){
  .count-badge { display:none; }
  .nav-btn { font-size:.7rem; padding:4px 6px; }
  header { padding:0 8px; gap:4px; }
}

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ── HERO ── */
.hero { padding:28px 16px 20px; max-width:680px; margin:0 auto; }
@media(min-width:600px){ .hero { padding:44px 20px 28px; } }
.hero h1 { font-family:'Playfair Display',serif; font-size:clamp(1.5rem,5vw,2.1rem); font-weight:600; line-height:1.25; margin-bottom:10px; }
.hero h1 em { font-style:normal; color:var(--accent); }
.hero p { font-size:.88rem; color:var(--text-muted); max-width:520px; line-height:1.75; }

/* ── CAROUSEL ── */
.carousel-section { max-width:680px; margin:0 auto 24px; padding:0 12px; }
@media(min-width:600px){ .carousel-section { padding:0 20px; margin-bottom:32px; } }
.carousel-header { font-size:.72rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.carousel-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:.7; display:inline-block; margin-right:7px; }
.carousel-nav { display:flex; gap:5px; }
.carousel-btn { width:27px; height:27px; border-radius:5px; background:var(--surface); border:1px solid var(--border); color:var(--text-muted); font-size:.85rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s,color .15s; }
.carousel-btn:hover:not(:disabled) { border-color:var(--accent-dim); color:var(--text); }
.carousel-btn:disabled { opacity:.25; cursor:default; }
.carousel-track-wrap { overflow:hidden; border-radius:8px; }
.carousel-track { display:flex; gap:10px; transition:transform .32s cubic-bezier(.4,0,.2,1); }
.carousel-item { flex-shrink:0; width:130px; cursor:pointer; border-radius:7px; overflow:hidden; border:1px solid var(--border); background:var(--surface); position:relative; transition:border-color .15s,transform .15s; }
.carousel-item:hover { border-color:var(--accent-dim); transform:translateY(-2px); }
.carousel-item img { width:130px; height:100px; object-fit:cover; display:block; }
.carousel-ph { width:130px; height:100px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1.8rem; opacity:.3; }
.carousel-item-label { padding:5px 8px 7px; font-size:.68rem; color:var(--text-muted); line-height:1.35; }
.carousel-item-name { display:block; color:var(--text); font-size:.71rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.carousel-item-meta { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-badge { position:absolute; top:5px; left:5px; font-size:.58rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 5px; border-radius:3px; background:rgba(0,0,0,.75); border:1px solid var(--accent-dim); color:var(--accent); backdrop-filter:blur(3px); }
.c-badge.found { border-color:#2D5A3A; color:#6DC98A; }
.carousel-empty { padding:24px; text-align:center; background:var(--surface); border:1px dashed var(--border); border-radius:8px; font-size:.8rem; color:var(--text-muted); }

/* ── SUBMIT ── */
.submit-section { max-width:680px; margin:0 auto 36px; padding:0 12px; }
@media(min-width:600px){ .submit-section { padding:0 20px; } }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:22px; }
.panel-title { font-size:.75rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }
.form-row { display:grid; gap:12px; margin-bottom:12px; }
.form-row.two { grid-template-columns:1fr 1fr; }
.form-row.three { grid-template-columns:1fr 1fr 1fr; }
@media(max-width:480px){ .form-row.two,.form-row.three { grid-template-columns:1fr; } }
label { display:block; font-size:.76rem; font-weight:500; color:var(--text-muted); margin-bottom:4px; letter-spacing:.03em; }
input[type=text],input[type=url],input[type=date],textarea,select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Inter',sans-serif; font-size:16px; padding:8px 11px; outline:none; transition:border-color .15s; }
@media(min-width:600px){ input[type=text],input[type=url],input[type=date],textarea,select { font-size:.86rem; } }
input:focus,textarea:focus,select:focus { border-color:var(--accent-dim); }
input::placeholder,textarea::placeholder { color:var(--text-muted); opacity:.45; }
textarea { resize:vertical; min-height:68px; }
select option { background:var(--surface); }

/* ── UPLOAD ── */
.upload-zone { border:1.5px dashed var(--border); border-radius:8px; background:var(--bg); padding:24px 16px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; position:relative; overflow:hidden; }
.upload-zone:hover,.upload-zone.drag-over { border-color:var(--accent-dim); background:#131310; }
.upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:1.4rem; margin-bottom:5px; opacity:.45; }
.upload-zone p { font-size:.78rem; color:var(--text-muted); pointer-events:none; }
.upload-zone p strong { color:var(--accent); }
.upload-preview { display:none; position:relative; }
.upload-preview img { width:100%; max-height:160px; object-fit:cover; border-radius:6px; display:block; }
.remove-img { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.7); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:2px 8px; font-size:.7rem; cursor:pointer; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; border-radius:6px; font-family:'Inter',sans-serif; font-size:.83rem; font-weight:500; cursor:pointer; border:none; transition:opacity .15s,background .15s; text-decoration:none; }
.btn:hover { opacity:.85; }
.btn-primary { background:var(--accent); color:#0E0E0E; font-weight:600; width:100%; justify-content:center; padding:11px; margin-top:6px; }
.btn-ghost { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
.btn-sm { font-size:.73rem; padding:4px 11px; }

/* ── SECTION LABEL ── */
.section-label { max-width:680px; margin:0 auto 12px; padding:0 12px; font-size:.72rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; gap:10px; }
@media(min-width:600px){ .section-label { padding:0 20px; } }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── FILTER BAR ── */
.filter-bar { max-width:680px; margin:0 auto 16px; padding:0 12px; display:flex; gap:8px; flex-wrap:wrap; }
@media(min-width:600px){ .filter-bar { padding:0 20px; } }
@media(max-width:480px){
  .filter-bar { gap:6px; }
  .filter-select { font-size:.78rem; padding:7px 8px; flex:1; min-width:0; }
}
@media(max-width:480px){
  .filter-bar { gap:6px; }
  .filter-select { font-size:.78rem; padding:7px 8px; flex:1; min-width:0; }
}
.search-wrap { flex:1; min-width:180px; position:relative; }
.search-wrap input { padding-left:30px; }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.82rem; pointer-events:none; }
.filter-select { background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Inter',sans-serif; font-size:.82rem; padding:8px 10px; outline:none; cursor:pointer; }
.filter-select:focus { border-color:var(--accent-dim); }

/* ── CARDS ── */
.cards-grid { max-width:680px; margin:0 auto; padding:0 12px; display:grid; gap:10px; }
@media(min-width:600px){ .cards-grid { padding:0 20px; gap:12px; } }
.person-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent-dim); border-radius:10px; overflow:hidden; display:grid; grid-template-columns:96px 1fr; animation:fadeIn .22s ease; transition:border-left-color .2s; }
.person-card:hover { border-left-color:var(--accent); }
.person-card.grouped { border-left-color:#4A6FA5; }
.person-card.found-card { border-left-color:var(--success); }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.card-thumb { width:96px; height:96px; object-fit:cover; display:block; background:var(--surface2); flex-shrink:0; }
.card-thumb-ph { width:96px; height:96px; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:1.5rem; flex-shrink:0; opacity:.4; }
.card-body { padding:10px 13px; display:flex; flex-direction:column; gap:4px; min-width:0; }
.card-names { font-size:.86rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-names.unknown { color:var(--text-muted); font-style:italic; font-weight:400; }
.card-meta { font-size:.7rem; color:var(--text-muted); display:flex; gap:8px; flex-wrap:wrap; }
.card-meta a { color:var(--accent); text-decoration:none; }
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:1px; }
.tag { font-size:.63rem; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:2px 6px; border-radius:3px; background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
.tag.found { background:#1E3A28; color:#6DC98A; border-color:#2D5A3A; }
.tag.grouped { background:#1A2A3E; color:#6A9FCC; border-color:#2A3E58; }
.tag.new { background:#2A1E0E; color:var(--accent); border-color:var(--accent-dim); }
.card-actions { display:flex; gap:5px; margin-top:auto; }

/* ── GALLERY PAGE ── */
.gallery-controls { max-width:900px; margin:0 auto 20px; padding:0 20px; display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
.gallery-controls .search-wrap { flex:2; min-width:200px; }
@media(max-width:480px){
  .gallery-controls { padding:0 12px; gap:6px; }
  .gallery-controls .search-wrap { min-width:100%; flex:none; width:100%; }
  .gallery-controls .filter-select { flex:1; font-size:.78rem; }
  .gallery-controls input[type=date] { width:100% !important; }
  .gallery-controls > div { flex:1; }
}
.gallery-grid { max-width:900px; margin:0 auto; padding:0 20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
@media(max-width:420px){
  .gallery-grid { grid-template-columns:repeat(2,1fr); gap:8px; padding:0 12px; }
  .gallery-card img { height:110px; }
  .gallery-card-ph { height:110px; }
}
.gallery-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer; transition:border-color .15s,transform .15s; position:relative; }
.gallery-card:hover { border-color:var(--accent-dim); transform:translateY(-2px); }
.gallery-card img { width:100%; height:140px; object-fit:cover; display:block; }
.gallery-card-ph { width:100%; height:140px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:2rem; opacity:.25; }
.gallery-card-info { padding:8px 10px; }
.gallery-card-name { font-size:.75rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.gallery-card-meta { font-size:.65rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gallery-badge { position:absolute; top:5px; right:5px; font-size:.58rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 5px; border-radius:3px; background:rgba(0,0,0,.75); backdrop-filter:blur(3px); }
.gallery-badge.found { border:1px solid #2D5A3A; color:#6DC98A; }
.gallery-badge.pending { border:1px solid var(--accent-dim); color:var(--accent); }
.gallery-badge.new { border:1px solid var(--accent-dim); color:var(--accent); }
.gallery-empty { grid-column:1/-1; padding:48px; text-align:center; color:var(--text-muted); font-size:.85rem; }

/* ── ABOUT PAGE ── */
.about-wrap { max-width:620px; margin:0 auto; padding:40px 20px 60px; }
.about-wrap h2 { font-family:'Playfair Display',serif; font-size:1.6rem; margin-bottom:18px; }
.about-wrap h3 { font-size:.9rem; font-weight:600; color:var(--accent); margin:24px 0 8px; letter-spacing:.03em; }
.about-wrap p { font-size:.88rem; color:var(--text-muted); line-height:1.8; margin-bottom:10px; }
.about-wrap a { color:var(--accent); text-decoration:none; }
.about-wrap a:hover { text-decoration:underline; }
.about-notice { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent-dim); border-radius:8px; padding:14px 16px; margin:20px 0; font-size:.84rem; color:var(--text-muted); line-height:1.7; }
.about-notice strong { color:var(--text); }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; overflow-y:auto; padding:16px; }
.modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:560px; margin:auto; animation:slideUp .2s ease; }
@media(max-width:540px){
  .modal-overlay { padding:0; align-items:flex-end; }
  .modal { border-radius:16px 16px 0 0; margin:0; max-height:92vh; overflow-y:auto; }
}
@keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.modal-header { padding:16px 18px 13px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h2 { font-family:'Playfair Display',serif; font-size:1.05rem; }
.modal-close { background:none; border:none; color:var(--text-muted); font-size:1.1rem; cursor:pointer; padding:2px 6px; border-radius:4px; }
.modal-close:hover { color:var(--text); background:var(--surface2); }
.modal-body { padding:18px; }
.modal-img { width:100%; max-height:280px; object-fit:contain; background:var(--bg); border-radius:8px; margin-bottom:14px; display:block; }
.modal-field { margin-bottom:10px; }
.modal-field-label { font-size:.7rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); margin-bottom:3px; }
.modal-field-val { font-size:.85rem; color:var(--text); word-break:break-word; }
.modal-field-val a { color:var(--accent); text-decoration:none; font-size:.8rem; }
.modal-field-val a:hover { text-decoration:underline; }
.modal-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
.comments-title { font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.comment-list { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
.comment { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 11px; font-size:.81rem; }
.comment-time { font-size:.67rem; color:var(--text-muted); margin-top:2px; }
.comment-input-row { display:flex; gap:7px; }
.comment-input-row input { flex:1; }
.group-section { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.group-section p { font-size:.78rem; color:var(--text-muted); margin-bottom:8px; }
.modal-actions { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); display:flex; gap:7px; flex-wrap:wrap; }

/* ── FOUND LOCATION ── */
.found-location-section { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.found-location-section p { font-size:.78rem; color:var(--text-muted); margin-bottom:8px; }
.found-location-display { background:var(--surface2); border:1px solid #2D5A3A; border-radius:6px; padding:9px 12px; font-size:.82rem; color:#6DC98A; margin-bottom:8px; }

/* ── TOAST ── */
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 18px; border-radius:8px; font-size:.8rem; z-index:999; transition:transform .22s ease; white-space:normal; max-width:88vw; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.45); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--success); color:#6DC98A; }
.toast.error { border-color:var(--danger); color:#CC7777; }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:44px 20px; color:var(--text-muted); }
.empty-icon { font-size:1.8rem; margin-bottom:8px; opacity:.35; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── UNVERIFIED TAG ── */
.tag.unverified { background:#2A1A08; color:#C8923A; border-color:#5A3A10; font-size:.6rem; }
.modal-unverified { display:inline-flex; align-items:center; gap:4px; font-size:.72rem; color:var(--accent); background:#2A1A08; border:1px solid #5A3A10; border-radius:4px; padding:2px 7px; margin-top:4px; }

/* ── DISCLAIMER BAR ── */
.disclaimer-bar { max-width:680px; margin:8px auto 0; padding:0 12px; }
@media(min-width:600px){ .disclaimer-bar { padding:0 20px; } }
.disclaimer-bar-inner { background:#0F1A0F; border:1px solid #2A4A2A; border-radius:6px; padding:8px 12px; font-size:.72rem; color:#6A9A6A; line-height:1.6; }
.disclaimer-bar-inner strong { color:#8ABA8A; }

/* ── THUMB ADJUSTER ── */
.thumb-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:300; align-items:center; justify-content:center; padding:20px; }
.thumb-modal-overlay.open { display:flex; }
.thumb-modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:420px; }
@media(max-width:480px){
  .thumb-modal-overlay { padding:0; align-items:flex-end; }
  .thumb-modal { border-radius:16px 16px 0 0; max-height:92vh; overflow-y:auto; }
}
.thumb-modal-header { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.thumb-modal-header h3 { font-size:.95rem; font-weight:600; }
.thumb-modal-close { background:none; border:none; color:var(--text-muted); font-size:1.1rem; cursor:pointer; padding:2px 6px; border-radius:4px; }
.thumb-modal-close:hover { color:var(--text); background:var(--surface2); }
.thumb-modal-body { padding:18px; }
.thumb-viewport-wrap {
  width:min(220px, calc(100vw - 80px)); height:min(220px, calc(100vw - 80px));
  border-radius:8px; overflow:hidden; position:relative; margin:0 auto 14px;
  border:2px solid var(--accent-dim); cursor:grab; touch-action:none;
  background:var(--bg);
}
.thumb-viewport-wrap:active { cursor:grabbing; }
.thumb-viewport-img {
  position:absolute; transform-origin:0 0;
  user-select:none; pointer-events:none;
  image-rendering:auto;
}
.thumb-controls { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.thumb-controls label { font-size:.72rem; color:var(--text-muted); flex-shrink:0; }
.thumb-zoom-slider {
  flex:1; -webkit-appearance:none; appearance:none;
  height:3px; border-radius:2px; background:var(--border); outline:none; cursor:pointer;
}
.thumb-zoom-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px;
  border-radius:50%; background:var(--accent); cursor:pointer;
}
.thumb-zoom-slider::-moz-range-thumb {
  width:16px; height:16px; border:none;
  border-radius:50%; background:var(--accent); cursor:pointer;
}
.thumb-hint { font-size:.72rem; color:var(--text-muted); text-align:center; margin-bottom:14px; }
.thumb-actions { display:flex; gap:8px; }
.thumb-actions .btn { flex:1; justify-content:center; }

/* thumbnail with custom pan/zoom stored as data attrs */
.card-thumb-custom { width:96px; height:96px; overflow:hidden; position:relative; flex-shrink:0; background:var(--surface2); }
.card-thumb-custom img { position:absolute; transform-origin:0 0; }

/* ── SAFETY BANNER ── */
.safety-banner {
  max-width:680px; margin:0 auto 0; padding:0 12px;
}
@media(min-width:600px){ .safety-banner { padding:0 20px; } }
.safety-banner-inner {
  background:#1A1510; border:1px solid #4A3010;
  border-left:3px solid var(--accent);
  border-radius:8px; padding:10px 14px;
  display:flex; align-items:flex-start; gap:10px;
  cursor:pointer; user-select:none;
}
.safety-banner-icon { font-size:1rem; flex-shrink:0; margin-top:1px; }
.safety-banner-text { flex:1; }
.safety-banner-title {
  font-size:.75rem; font-weight:600; color:var(--accent);
  letter-spacing:.04em; display:flex; align-items:center; justify-content:space-between;
}
.safety-banner-title .toggle-arrow { font-size:.7rem; color:var(--text-muted); transition:transform .2s; }
.safety-banner-title .toggle-arrow.open { transform:rotate(180deg); }
.safety-banner-body {
  font-size:.76rem; color:var(--text-muted); line-height:1.7;
  margin-top:7px; display:none;
}
.safety-banner-body.open { display:block; }
.safety-banner-body strong { color:var(--text); }
.safety-banner-body ul { padding-left:14px; margin-top:4px; }
.safety-banner-body li { margin-bottom:3px; }

/* ── HELP SECTION ── */
.help-toggle {
  display:flex; align-items:center; gap:6px;
  font-size:.74rem; color:var(--text-muted);
  cursor:pointer; margin-top:4px; margin-bottom:0;
  background:none; border:none; padding:0;
  font-family:'Inter',sans-serif;
}
.help-toggle:hover { color:var(--text); }
.help-toggle .help-arrow { font-size:.65rem; transition:transform .2s; }
.help-toggle .help-arrow.open { transform:rotate(180deg); }
.help-body {
  display:none; background:var(--bg); border:1px solid var(--border);
  border-radius:7px; padding:14px 16px; margin-top:8px;
  font-size:.78rem; color:var(--text-muted); line-height:1.75;
}
.help-body.open { display:block; }
.help-body h4 {
  font-size:.72rem; font-weight:600; color:var(--accent);
  letter-spacing:.06em; text-transform:uppercase;
  margin:12px 0 5px;
}
.help-body h4:first-child { margin-top:0; }
.help-body ol { padding-left:16px; }
.help-body ol li { margin-bottom:4px; }
.help-body strong { color:var(--text); }

/* ── FOOTER ── */
footer { margin-top:60px; padding:22px 20px; border-top:1px solid var(--border); text-align:center; }
footer p { font-size:.7rem; color:var(--text-muted); line-height:1.9; }
footer strong { color:var(--text); letter-spacing:.05em; }
footer .disc { margin-top:5px; font-size:.65rem; opacity:.55; max-width:400px; margin-left:auto; margin-right:auto; }
</style>

const SUPA_URL = 'https://fymbasteshhhulybuhco.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5bWJhc3Rlc2hoaHVseWJ1aGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDE5MzksImV4cCI6MjA5ODMxNzkzOX0.keVnlgrjOy_-yQUH78BH4ZggsAgR6Y5TViGx3yuhoPc';

const supa = {
  async query(table, opts={}){
    let url = `${SUPA_URL}/rest/v1/${table}?`;
    if(opts.select)  url += `select=${opts.select}&`;
    if(opts.order)   url += `order=${opts.order}&`;
    if(opts.eq)      Object.entries(opts.eq).forEach(([k,v])=>{ url+=`${k}=eq.${v}&`; });
    if(opts.limit)   url += `limit=${opts.limit}&`;
    const res = await fetch(url, { headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}` }});
    return res.json();
  },
  async insert(table, data){
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method:'POST',
      headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation' },
      body: JSON.stringify(data)
    });
    return res.json();
  },
  async update(table, data, eq){
    let url = `${SUPA_URL}/rest/v1/${table}?`;
    Object.entries(eq).forEach(([k,v])=>{ url+=`${k}=eq.${v}&`; });
    const res = await fetch(url, {
      method:'PATCH',
      headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation' },
      body: JSON.stringify(data)
    });
    return res.json();
  },
  async uploadImage(path, base64){
    // convert base64 to blob
    const arr = base64.split(','), mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length, u8 = new Uint8Array(n);
    while(n--) u8[n] = bstr.charCodeAt(n);
    const blob = new Blob([u8], {type:mime});
    const res = await fetch(`${SUPA_URL}/storage/v1/object/screenshots/${path}`, {
      method:'POST',
      headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':mime },
      body: blob
    });
    if(res.ok) return `${SUPA_URL}/storage/v1/object/public/screenshots/${path}`;
    return null;
  }
};

let entries = [];

let currentEntryId = null;

function t(k){ return T[lang][k] || T['es'][k] || k; }

// Fetch all entries + their comments from Supabase
async function loadEntries(){
  try {
    const rows = await supa.query('entries', { select:'*', order:'created_at.desc' });
    if(!Array.isArray(rows)){ console.error('loadEntries error', rows); return; }
    // Fetch all comments in one call
    const comments = await supa.query('comments', { select:'*', order:'created_at.asc' });
    const commentsArr = Array.isArray(comments) ? comments : [];
    // Map to app format
    entries = rows.map(r => ({
      id:            r.id,
      imageData:     r.image_url,
      videoUrl:      r.video_url,
      names:         r.names || '',
      sex:           r.sex || '',
      platform:      r.platform || '',
      date:          r.entry_date || '',
      notes:         r.notes || '',
      status:        r.status || 'unidentified',
      groupId:       r.group_id || null,
      foundLocation: r.found_location || '',
      createdAt:     r.created_at,
      comments:      commentsArr.filter(c=>c.entry_id===r.id).map(c=>({ id:c.id, text:c.text, createdAt:c.created_at }))
    }));
  } catch(err){ console.error('loadEntries failed', err); }
}

const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('file-input');
const previewEl  = document.getElementById('upload-preview');
const previewImg = document.getElementById('preview-img');
const removeBtn  = document.getElementById('remove-img');

fileInput.addEventListener('change', e => { if(e.target.files[0]) handleImageFile(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) handleImageFile(f);
});

function handleImageFile(file){
  const reader = new FileReader();
  reader.onload = ev => compressImage(ev.target.result, 420, d => {
    imageFile = d;
    previewImg.src = d;
    uploadZone.style.display='none';
    previewEl.style.display='block';
  });
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxW, cb){
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const r = Math.min(1, maxW/img.width);
    canvas.width=img.width*r; canvas.height=img.height*r;
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    cb(canvas.toDataURL('image/jpeg',.74));
  };
  img.src=dataUrl;
}

removeBtn.addEventListener('click', () => {
  imageFile=null; fileInput.value=''; previewImg.src='';
  previewEl.style.display='none'; uploadZone.style.display='block';
  resetThumbState();
});

  const videoUrl = document.getElementById('video-url').value.trim();
  if(!imageFile){ showToast(t('toast_err_img'),'error'); return; }
  if(!videoUrl){  showToast(t('toast_err_url'),'error'); return; }

  // Rate limit: max 10 submissions per hour (client-side)
  const RL_KEY = 'tv_rl';
  const now = Date.now();
  const rl = JSON.parse(localStorage.getItem(RL_KEY) || '[]').filter(ts => now - ts < 3600000);
  if(rl.length >= 10){ showToast(t('toast_rate_limit'),'error'); return; }
  rl.push(now);
  localStorage.setItem(RL_KEY, JSON.stringify(rl));

  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='...';

  try {
    // Upload image to Supabase Storage
    const imgPath = `${Date.now()}.jpg`;
    // use thumbOverride for stored thumbnail if user adjusted it, else full image
    const uploadData = window.thumbOverride || imageFile;
    const imageUrl = await supa.uploadImage(imgPath, uploadData);

    // Insert entry row
    const rows = await supa.insert('entries', {
      image_url:      imageUrl,
      video_url:      videoUrl,
      names:          document.getElementById('suggested-names').value.trim(),
      sex:            document.getElementById('sex').value,
      platform:       document.getElementById('platform').value,
      entry_date:     document.getElementById('entry-date').value,
      notes:          document.getElementById('notes').value.trim(),
      status:         'unidentified'
    });

    await loadEntries();
    refreshAll();
    showToast(t('toast_added'),'success');
    document.getElementById('video-url').value='';
    document.getElementById('suggested-names').value='';
    document.getElementById('sex').value='';
    document.getElementById('platform').value='';
    document.getElementById('entry-date').value='';
    document.getElementById('notes').value='';
    removeBtn.click();
    resetThumbState();
  } catch(err){
    console.error(err);
    showToast('Error al guardar. Intenta de nuevo.','error');
  } finally {
    btn.disabled=false; btn.innerHTML=t('btn_submit');
  }
});

// HELPERS
// ══════════════════════════════════════════════
function isNew(iso){ return (Date.now()-new Date(iso).getTime()) < 1000*60*60*2; }
function timeAgo(iso){
  const diff=Date.now()-new Date(iso).getTime(), m=Math.floor(diff/60000);
  if(m<1) return {es:'Ahora mismo',pt:'Agora mesmo',en:'Just now'}[lang];
  if(m<60) return ({es:`Hace ${m} min`,pt:`Há ${m} min`,en:`${m} min ago`})[lang];
  const h=Math.floor(m/60);
  if(h<24) return ({es:`Hace ${h}h`,pt:`Há ${h}h`,en:`${h}h ago`})[lang];
  return ({es:`Hace ${Math.floor(h/24)}d`,pt:`Há ${Math.floor(h/24)}d`,en:`${Math.floor(h/24)}d ago`})[lang];
}
function sexLabel(s){ return {M:t('opt_male'),F:t('opt_female'),O:t('opt_other')}[s]||t('opt_unknown'); }

// ══════════════════════════════════════════════
// FILTER / SORT SHARED
// ══════════════════════════════════════════════
function applyFilters(pool, search, sexVal, statusVal, sortVal, dateFrom, dateTo){
  let out = pool.filter(e => {
    if(sexVal && sexVal!=='all' && e.sex!==sexVal) return false;
    if(statusVal==='unidentified' && e.status!=='unidentified') return false;
    if(statusVal==='identified'   && e.status!=='identified')   return false;
    if(statusVal==='grouped'      && !e.groupId)                return false;
    if(dateFrom && e.date && e.date < dateFrom) return false;
    if(dateTo   && e.date && e.date > dateTo)   return false;
    if(search){
      const q=search.toLowerCase();
      if(!e.names.toLowerCase().includes(q) && !e.platform.toLowerCase().includes(q) && !e.notes.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  if(sortVal==='oldest') out.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  else out.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return out;
}

function renderCards(){
  const grid   = document.getElementById('cards-grid');
  const search = document.getElementById('search-input').value;
  const sex    = document.getElementById('filter-sex').value;
  const status = document.getElementById('filter-status').value;
  const sort   = document.getElementById('filter-sort').value;
  const filtered = applyFilters(entries, search, sex, status, sort, '', '');

  if(!filtered.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">👁</div><p>${t('empty_home')}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(e => {
    const thumb = e.imageData
      ? `<img class="card-thumb" src="${e.imageData}" alt="">`
      : `<div class="card-thumb-ph">👤</div>`;
    const nameText  = e.names || t('lbl_no_name');
    const nameClass = e.names ? '' : 'unknown';
    const tags = [];
    if(e.status==='identified') tags.push(`<span class="tag found">${t('status_found')}</span>`);
    else if(e.names) tags.push(`<span class="tag unverified">${t('tag_unverified')}</span>`);
    if(e.groupId) tags.push(`<span class="tag grouped">${t('tag_grouped')}</span>`);
    if(isNew(e.createdAt)) tags.push(`<span class="tag new">New</span>`);
    if(e.foundLocation) tags.push(`<span class="tag found">📍</span>`);
    return `
      <div class="person-card ${e.groupId?'grouped':''} ${e.foundLocation?'found-card':''}" data-id="${e.id}">
        ${thumb}
        <div class="card-body">
          <div class="card-names ${nameClass}">${nameText}</div>
          <div class="card-meta">
            <span>#${e.id}${e.platform?' · '+e.platform:''}</span>
            ${e.sex?`<span>${sexLabel(e.sex)}</span>`:''}
            ${e.comments.length?`<span>💬 ${e.comments.length}</span>`:''}
            <span>${timeAgo(e.createdAt)}</span>
          </div>
          <div class="card-tags">${tags.join('')}</div>
          <div class="card-actions">
            <button class="btn btn-ghost btn-sm" onclick="openModal(${e.id})">${t('card_see')}</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// CAROUSEL
// ══════════════════════════════════════════════
const ITEM_W = 140;
let cIdx = 0;

function getCarouselPool(){
  const unid = entries.filter(e=>e.status!=='identified').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const id   = entries.filter(e=>e.status==='identified').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return [...unid,...id].slice(0,30);
}

function renderCarousel(){
  const wrap  = document.querySelector('.carousel-track-wrap');
  const pool  = getCarouselPool();
  const prevBtn = document.getElementById('carousel-prev');
  const nextBtn = document.getElementById('carousel-next');
  if(!wrap) return;
  if(!pool.length){
    wrap.innerHTML=`<div class="carousel-empty">${t('empty_home').replace('<br>',' ')}</div>`;
    if(prevBtn) prevBtn.disabled=true;
    if(nextBtn) nextBtn.disabled=true;
    return;
  }
  // Restore track if it was replaced by the empty state div
  if(!document.getElementById('carousel-track')){
    wrap.innerHTML='<div class="carousel-track" id="carousel-track"></div>';
  }
  const track = document.getElementById('carousel-track');
  track.innerHTML = pool.map(e => {
    const img = e.imageData ? `<img src="${e.imageData}" alt="" loading="lazy">` : `<div class="carousel-ph">👤</div>`;
    const badge = e.status==='identified'
      ? `<span class="c-badge found">${t('status_found')}</span>`
      : isNew(e.createdAt) ? `<span class="c-badge">New</span>` : '';
    return `<div class="carousel-item" onclick="carouselClick(${e.id})">
      ${img}${badge}
      <div class="carousel-item-label">
        <span class="carousel-item-name">${e.names||t('lbl_no_name')}</span>
        <span class="carousel-item-meta">#${e.id}${e.platform?' · '+e.platform:''}</span>
      </div></div>`;
  }).join('');
  cIdx=0; updateCarouselPos();
}

function visibleCount(){ const w=document.querySelector('.carousel-track-wrap'); return w?Math.floor(w.offsetWidth/ITEM_W):4; }
function updateCarouselPos(){
  const track=document.getElementById('carousel-track');
  if(!track) return;
  const max=Math.max(0,getCarouselPool().length-visibleCount());
  cIdx=Math.min(cIdx,max);
  track.style.transform=`translateX(-${cIdx*ITEM_W}px)`;
  document.getElementById('carousel-prev').disabled=cIdx<=0;
  document.getElementById('carousel-next').disabled=cIdx>=max;
}
document.getElementById('carousel-prev').addEventListener('click',()=>{ cIdx=Math.max(0,cIdx-1); updateCarouselPos(); });
document.getElementById('carousel-next').addEventListener('click',()=>{ const max=Math.max(0,getCarouselPool().length-visibleCount()); cIdx=Math.min(max,cIdx+1); updateCarouselPos(); });
function carouselClick(id){
  openModal(id);
  const card=document.querySelector(`.person-card[data-id="${id}"]`);
  if(card){ setTimeout(()=>{ card.scrollIntoView({behavior:'smooth',block:'center'}); card.style.borderLeftColor='var(--accent)'; setTimeout(()=>card.style.borderLeftColor='',1200); },80); }
}
window.addEventListener('resize',updateCarouselPos);

// ══════════════════════════════════════════════
// THUMBNAIL ADJUSTER
// ══════════════════════════════════════════════
let thumbState = { x:0, y:0, scale:1 }; // current adjustment for this upload
let thumbDragging = false;
let thumbDragStart = { x:0, y:0, imgX:0, imgY:0 };

function openThumbAdjuster(){
  if(!imageFile) return;
  const overlay = document.getElementById('thumb-modal-overlay');
  const img     = document.getElementById('thumb-viewport-img');
  const zoom    = document.getElementById('thumb-zoom');

  img.src = imageFile;
  img.onload = () => {
    // init: fit image so shortest side = viewport (220px)
    const vw = 220, vh = 220;
    const scale = Math.max(vw / img.naturalWidth, vh / img.naturalHeight);
    const initScale = Math.max(scale, thumbState.scale === 1 ? scale : thumbState.scale);
    thumbState.scale = initScale;
    // center by default if no prior state
    if(thumbState.x === 0 && thumbState.y === 0){
      thumbState.x = (vw - img.naturalWidth  * initScale) / 2;
      thumbState.y = (vh - img.naturalHeight * initScale) / 2;
    }
    zoom.min  = scale.toFixed(3);
    zoom.max  = (scale * 4).toFixed(3);
    zoom.step = (scale * 0.05).toFixed(4);
    zoom.value = thumbState.scale;
    applyThumbTransform();
  };

  overlay.classList.add('open');
  applyTranslations(); // re-run so modal text is correct language
}

function closeThumbAdjuster(){
  document.getElementById('thumb-modal-overlay').classList.remove('open');
}

function applyThumbTransform(){
  const img = document.getElementById('thumb-viewport-img');
  img.style.transform = `translate(${thumbState.x}px, ${thumbState.y}px) scale(${thumbState.scale})`;
}

function clampThumb(){
  const vw = 220, vh = 220;
  const img = document.getElementById('thumb-viewport-img');
  const iw  = img.naturalWidth  * thumbState.scale;
  const ih  = img.naturalHeight * thumbState.scale;
  thumbState.x = Math.min(0, Math.max(vw - iw, thumbState.x));
  thumbState.y = Math.min(0, Math.max(vh - ih, thumbState.y));
}

// Zoom slider
document.getElementById('thumb-zoom').addEventListener('input', function(){
  const vw = 220, vh = 220;
  const img = document.getElementById('thumb-viewport-img');
  const oldScale = thumbState.scale;
  const newScale = parseFloat(this.value);
  // zoom toward center of viewport
  const cx = vw / 2, cy = vh / 2;
  thumbState.x = cx - (cx - thumbState.x) * (newScale / oldScale);
  thumbState.y = cy - (cy - thumbState.y) * (newScale / oldScale);
  thumbState.scale = newScale;
  clampThumb();
  applyThumbTransform();
});

// Mouse drag
const vp = document.getElementById('thumb-viewport');
vp.addEventListener('mousedown', e => {
  thumbDragging = true;
  thumbDragStart = { x: e.clientX, y: e.clientY, imgX: thumbState.x, imgY: thumbState.y };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!thumbDragging) return;
  thumbState.x = thumbDragStart.imgX + (e.clientX - thumbDragStart.x);
  thumbState.y = thumbDragStart.imgY + (e.clientY - thumbDragStart.y);
  clampThumb();
  applyThumbTransform();
});
window.addEventListener('mouseup', () => { thumbDragging = false; });

// Touch drag
vp.addEventListener('touchstart', e => {
  const touch = e.touches[0];
  thumbDragging = true;
  thumbDragStart = { x: touch.clientX, y: touch.clientY, imgX: thumbState.x, imgY: thumbState.y };
  e.preventDefault();
}, { passive:false });
window.addEventListener('touchmove', e => {
  if(!thumbDragging) return;
  const touch = e.touches[0];
  thumbState.x = thumbDragStart.imgX + (touch.clientX - thumbDragStart.x);
  thumbState.y = thumbDragStart.imgY + (touch.clientY - thumbDragStart.y);
  clampThumb();
  applyThumbTransform();
}, { passive:false });
window.addEventListener('touchend', () => { thumbDragging = false; });

function applyThumbAdjust(){
  // Render the current viewport view to a 200x200 canvas for the thumbnail
  const vimg   = document.getElementById('thumb-viewport-img');
  const canvas = document.createElement('canvas');
  canvas.width = 200; canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(
    vimg,
    -thumbState.x / thumbState.scale,
    -thumbState.y / thumbState.scale,
    200 / thumbState.scale,
    200 / thumbState.scale,
    0, 0, 200, 200
  );
  // Store thumbnail separately — imageFile stays as the FULL image for Supabase
  window.thumbOverride = canvas.toDataURL('image/jpeg', 0.82);
  // Update the preview in the form to show the adjusted thumbnail
  document.getElementById('preview-img').src = window.thumbOverride;
  closeThumbAdjuster();
  showToast({es:'Miniatura ajustada.',pt:'Miniatura ajustada.',en:'Thumbnail adjusted.'}[lang],'success');
}

// Reset thumb state when a new image is chosen
function resetThumbState(){ thumbState = {x:0,y:0,scale:1}; window.thumbOverride = null; }
